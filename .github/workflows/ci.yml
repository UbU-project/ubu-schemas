name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - run: cargo fmt --check
      - run: cargo clippy --all-targets
        # TODO: restore `-D warnings` when implementation tickets land.
      - run: cargo test
      - run: scripts/validate-all.sh

