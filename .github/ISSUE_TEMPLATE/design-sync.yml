    id: topic
    attributes:
      label: Topic
    validations:
      required: true
  - type: textarea
    id: participants
    attributes:
      label: Participants
      description: Which projects or maintainers need to align?
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome

